name: Raccolta dati ARPA Piemonte
on:
  schedule:
    - cron: '55 22 * * *'
  workflow_dispatch:
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Raccoglie dati
        run: node .github/scripts/collect-piemonte.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/piemonte/
          git diff --staged --quiet || git commit -m "dati Piemonte $(date -u +%Y-%m-%d)"
          git push
