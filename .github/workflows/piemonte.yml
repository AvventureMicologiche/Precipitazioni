name: Piemonte
on:
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Data da raccogliere (YYYY-MM-DD, lascia vuoto per oggi)'
        required: false
        default: ''
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
    - cron: '0 8 * * *'
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
    - cron: '0 20 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Raccoglie dati Piemonte
        run: node .github/scripts/collect-piemonte.js
        env:
          DATE_OVERRIDE: ${{ inputs.date_override }}
      - name: Commit e push
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add data/piemonte/
          git diff --staged --quiet || git commit -m "piemonte $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
